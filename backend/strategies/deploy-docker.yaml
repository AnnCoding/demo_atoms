name: deploy-docker
display_name: 容器化与部署
description: 为项目生成 Dockerfile + docker-compose + 部署说明
category: deployment
trigger_keywords:
  - 部署
  - deploy
  - docker
  - 容器
  - 上线
  - 发布
  - dockerfile
target_agent: alex
collaborator_agents:
  - bob
required_tools:
  - file_write
  - file_read
default_active: false
default_router: true
default_priority: 11

instructions: |
  先用 file_read 了解项目结构,再用 file_write 生成:

  1. `Dockerfile` —— 多阶段构建(Python slim 或 node alpine),非 root 用户运行,最小镜像,只装必要依赖。
  2. `docker-compose.yml` —— app 服务 + postgres(或相应依赖),含 volume、healthcheck、环境变量。
  3. `.dockerignore` —— 排除 node_modules / .venv / **pycache** / .git 等。
  4. `deploy.md` —— 构建/运行步骤 + 必需环境变量清单 + 常见问题。

  安全:密钥不烤进镜像,一律走环境变量;镜像不包含 .env。
