<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>记账 · database.md 真实文件演示</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background:#f5f6f8; color:#222; padding:24px; line-height:1.5; }
  .wrap { max-width: 820px; margin: 0 auto; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .sub { color:#888; font-size: 13px; margin-bottom: 20px; }
  .card { background:#fff; border:1px solid #e8eaed; border-radius:10px; padding:18px 20px; margin-bottom:16px; }
  .env-error { background:#fee; color:#900; border:1px solid #fbb; padding:14px 16px; border-radius:8px; font-size:14px; }
  button { cursor:pointer; border:none; border-radius:6px; padding:8px 16px; font-size:14px; background:#333; color:#fff; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  button.ghost { background:#fff; color:#333; border:1px solid #d0d3d8; }
  button.primary { background:#2563eb; }
  .del { background:#fee; color:#c00; padding:3px 10px; font-size:12px; }
  input, select { padding:7px 10px; border:1px solid #d0d3d8; border-radius:6px; font-size:14px; background:#fff; }
  input:focus, select:focus { outline:none; border-color:#2563eb; }
  form { display:grid; grid-template-columns: repeat(5, 1fr) auto; gap:8px; align-items:end; }
  label { font-size:12px; color:#666; display:block; margin-bottom:3px; }
  .sums { display:grid; grid-template-columns: repeat(4,1fr); gap:12px; text-align:center; }
  .sums .n { font-size:22px; font-weight:600; }
  .sums .l { font-size:12px; color:#888; }
  .sums .out { color:#c00; } .sums .in { color:#16a34a; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th, td { padding:8px 10px; text-align:left; border-bottom:1px solid #eef0f3; }
  th { color:#888; font-weight:500; font-size:12px; }
  td.num { font-variant-numeric: tabular-nums; }
  .tag { font-size:12px; padding:2px 8px; border-radius:10px; }
  .tag.out { background:#fee; color:#c00; } .tag.in { background:#dcfce7; color:#16a34a; }
  tr.empty td { text-align:center; color:#aaa; padding:24px; }
  details { margin-top:14px; }
  summary { cursor:pointer; color:#666; font-size:13px; }
  pre { background:#1e1e2e; color:#cdd6f4; padding:14px; border-radius:8px; font-size:12px; overflow:auto; margin-top:10px; }
  .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .status { font-size:13px; color:#16a34a; }
</style>
</head>
<body>
<div class="wrap">
  <h1>💰 记账本</h1>
  <div class="sub">local_markdown_storage skill 演示 —— 数据存在真实的 <code>database.md</code> 文件里</div>

  <!-- 环境检测失败时显示 -->
  <div id="envError" class="env-error" hidden></div>

  <!-- 连接条 -->
  <div id="connectBar" class="card">
    <p style="margin-bottom:12px">点击下方按钮,选择同目录下的 <code>database.md</code> 文件并授权读写。浏览器会记住这个文件,下次只需再点一次即可。</p>
    <button id="connectBtn" class="primary">🔗 连接本地数据库(database.md)</button>
  </div>

  <!-- 应用主体(连接成功后显示) -->
  <div id="app" hidden>
    <div class="topbar">
      <span class="status">✅ 已连接 database.md(真实文件读写中)</span>
      <span>
        <button class="ghost" onclick="onRepick()">换文件</button>
        <button class="ghost" onclick="onExport()">导出备份</button>
      </span>
    </div>

    <div class="card">
      <form id="addForm">
        <div><label>类型</label><select id="type"><option>支出</option><option>收入</option></select></div>
        <div><label>金额</label><input id="amount" type="number" step="0.01" placeholder="0.00" required></div>
        <div><label>分类</label><input id="category" list="cats" placeholder="餐饮"></div>
        <datalist id="cats"><option>餐饮</option><option>交通</option><option>购物</option><option>工资</option><option>其他</option></datalist>
        <div><label>备注</label><input id="note" placeholder="(可选)"></div>
        <div><label>日期</label><input id="date" type="date"></div>
        <div><button class="primary" type="submit">+ 记一笔</button></div>
      </form>
    </div>

    <div class="card">
      <div class="sums">
        <div><div class="n out" id="sumExpense">0.00</div><div class="l">支出</div></div>
        <div><div class="n in" id="sumIncome">0.00</div><div class="l">收入</div></div>
        <div><div class="n" id="sumBalance">0.00</div><div class="l">结余</div></div>
        <div><div class="n" id="sumCount">0</div><div class="l">笔数</div></div>
      </div>
    </div>

    <div class="card">
      <table>
        <thead><tr><th>日期</th><th>类型</th><th>金额</th><th>分类</th><th>备注</th><th>操作</th></tr></thead>
        <tbody id="list"></tbody>
      </table>

      <details>
        <summary>📄 查看 database.md 真实文件内容(每次操作后自动刷新)</summary>
        <pre id="raw"></pre>
      </details>
    </div>
  </div>
</div>

<script>
/* ===== MarkdownStore class —— 原样来自 storage_skill.yaml ===== */
class MarkdownStore {
  constructor(fileName = 'database.md'){
    this.fileName = fileName;
    this.db = {};
    this._schema = {};
    this.handle = null;
    this.connected = false;
  }
  async connect(){
    this.handle = await this._getHandle();
    if(!this.handle){
      if(!window.showOpenFilePicker) throw new Error('当前浏览器不支持本地文件读写,请用 Chrome/Edge 并通过 localhost 打开');
      [this.handle] = await window.showOpenFilePicker({
        types:[{ description:'Markdown 数据库', accept:{'text/markdown':['.md']} }]
      });
      await this._setHandle(this.handle);
    }
    const cur = await this.handle.queryPermission({ mode:'readwrite' });
    const perm = cur === 'granted' ? 'granted' : await this.handle.requestPermission({ mode:'readwrite' });
    if(perm !== 'granted') throw new Error('未授予读写权限');
    await this._load();
    this.connected = true;
    return this;
  }
  async _load(){
    const file = await this.handle.getFile();
    this.db = this._parse(await file.text());
  }
  async _persist(){
    const w = await this.handle.createWritable();
    await w.write(this._serialize());
    await w.close();
  }
  _parse(md){
    const db = {};
    for(const sec of md.split(/^## /m)){
      const lines = sec.split('\n');
      const table = lines[0].trim();
      if(!table || table.startsWith('#')) continue;
      const tl = lines.filter(l => l.trim().startsWith('|'));
      if(tl.length < 2){ db[table] = []; continue; }
      const cols = tl[0].split('|').slice(1,-1).map(s => s.trim());
      this._schema[table] = cols;
      db[table] = tl.slice(2).map(line => {
        const vals = line.split('|').slice(1,-1).map(s => s.trim().replace(/\\\|/g,'|'));
        const o = {}; cols.forEach((c,i) => { o[c] = vals[i] ?? ''; }); return o;
      });
    }
    return db;
  }
  _serialize(){
    let md = '# Database\n\n';
    for(const [table, rows] of Object.entries(this.db)){
      const cols = this._schema[table] || (rows[0] ? Object.keys(rows[0]) : []);
      md += `## ${table}\n\n| ${cols.join(' | ')} |\n| ${cols.map(()=>'---').join(' | ')} |\n`;
      for(const r of rows){
        md += '| ' + cols.map(c => String(r[c] ?? '').replace(/\|/g,'\\|')).join(' | ') + ' |\n';
      }
      md += '\n';
    }
    return md;
  }
  async createTable(table, columns){
    if(this.db[table]) return;
    this.db[table] = [];
    this._schema[table] = columns;
    await this._persist();
  }
  async insert(table, record){
    if(!this.db[table]) this.db[table] = [];
    if(!record.id) record.id = this._genId();
    this.db[table].push(record);
    await this._persist();
    return record;
  }
  readAll(table){ return this.db[table] ? this.db[table].map(r => ({ ...r })) : []; }
  async update(table, idVal, patch, idCol = 'id'){
    const rows = this.db[table] || [];
    const r = rows.find(x => String(x[idCol]) === String(idVal));
    if(!r) return null;
    Object.assign(r, patch, { [idCol]: r[idCol] });
    await this._persist();
    return r;
  }
  async delete(table, idVal, idCol = 'id'){
    const before = (this.db[table] || []).length;
    this.db[table] = (this.db[table] || []).filter(x => String(x[idCol]) !== String(idVal));
    const changed = this.db[table].length < before;
    await this._persist();
    return changed;
  }
  count(table){ return (this.db[table] || []).length; }
  async exportAll(){
    const blob = new Blob([this._serialize()], { type:'text/markdown;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = this.fileName;
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(a.href);
  }
  async importFile(file){
    this.db = this._parse(await file.text());
    await this._persist();
  }
  _getHandle(){
    return new Promise(res => {
      const req = indexedDB.open('mdstore', 1);
      req.onupgradeneeded = () => req.result.createObjectStore('h');
      req.onsuccess = () => {
        const t = req.result.transaction('h').objectStore('h').get('handle');
        t.onsuccess = () => res(t.result || null);
        t.onerror = () => res(null);
      };
      req.onerror = () => res(null);
    });
  }
  _setHandle(h){
    return new Promise(res => {
      const req = indexedDB.open('mdstore', 1);
      req.onupgradeneeded = () => req.result.createObjectStore('h');
      req.onsuccess = () => { req.result.transaction('h','readwrite').objectStore('h').put(h,'handle'); res(); };
      req.onerror = () => res();
    });
  }
  _genId(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
}

/* ===== 应用逻辑(数据层/渲染层/事件层 分离)===== */
const store = new MarkdownStore('database.md');
const $ = id => document.getElementById(id);

document.addEventListener('DOMContentLoaded', () => {
  // 第 1 步:环境检测 —— 不支持就红字提示,不静默失败
  if(!window.showOpenFilePicker){
    $('envError').hidden = false;
    $('envError').innerHTML = '⚠️ 当前环境不支持读写本地文件。请用 <b>Chrome / Edge</b>,并通过本地服务器打开本页(<code>python3 -m http.server 8000</code>),不要双击 file:// 打开。';
    $('connectBar').hidden = true;
    return;
  }
  // 第 2 步:绑定连接按钮(授权必须在用户点击手势里完成)
  $('connectBtn').onclick = onConnect;
  $('addForm').addEventListener('submit', onAdd);
});

async function onConnect(){
  const btn = $('connectBtn');
  btn.disabled = true; btn.textContent = '连接中…';
  try{
    await store.connect();                                  // 第 3 步:连接真实文件
    await store.createTable('transactions',                 // 第 4 步:建表(幂等)
      ['id','type','amount','category','note','date']);
    $('connectBar').hidden = true;
    $('app').hidden = false;
    $('date').value = new Date().toISOString().slice(0,10);
    await render();                                         // 第 5 步:渲染已有数据
  }catch(e){
    alert('连接失败:'+e.message);
    btn.disabled = false; btn.textContent = '🔗 连接本地数据库(database.md)';
  }
}

async function onAdd(e){                                     // 第 6 步:事件层 —— 先 await 写入,再 render
  e.preventDefault();
  const rec = {
    type:     $('type').value,
    amount:   $('amount').value,
    category: $('category').value.trim(),
    note:     $('note').value.trim(),
    date:     $('date').value,
  };
  if(!rec.amount){ alert('请填金额'); return; }
  await store.insert('transactions', rec);
  e.target.reset();
  $('date').value = new Date().toISOString().slice(0,10);
  await render();
}

async function onDelete(id){
  await store.delete('transactions', id);
  await render();
}

async function onRepick(){
  try{
    [store.handle] = await window.showOpenFilePicker({
      types:[{ description:'Markdown 数据库', accept:{'text/markdown':['.md']} }]
    });
    await store._setHandle(store.handle);
    await store._load();
    await store.createTable('transactions', ['id','type','amount','category','note','date']);
    await render();
  }catch(_){ /* 用户取消 */ }
}

async function onExport(){ await store.exportAll(); }

async function render(){                                     // 渲染层:只读,不写
  const rows = store.readAll('transactions').sort((a,b) => (b.date||'').localeCompare(a.date||''));
  let exp = 0, inc = 0;
  rows.forEach(r => { const n = Number(r.amount)||0; r.type === '收入' ? (inc += n) : (exp += n); });
  $('sumExpense').textContent = exp.toFixed(2);
  $('sumIncome').textContent  = inc.toFixed(2);
  $('sumBalance').textContent = (inc - exp).toFixed(2);
  $('sumCount').textContent   = rows.length;

  $('list').innerHTML = rows.length
    ? rows.map(r => `
        <tr>
          <td>${esc(r.date)}</td>
          <td><span class="tag ${r.type==='收入'?'in':'out'}">${esc(r.type)}</span></td>
          <td class="num">${(Number(r.amount)||0).toFixed(2)}</td>
          <td>${esc(r.category)}</td>
          <td>${esc(r.note)}</td>
          <td><button class="del" onclick="onDelete('${r.id}')">删</button></td>
        </tr>`).join('')
    : '<tr class="empty"><td colspan="6">还没有记录,记一笔试试 →</td></tr>';

  // 顺带把【磁盘上真实文件】的原文读出来展示,证明读写的是真文件
  try{
    const file = await store.handle.getFile();
    $('raw').textContent = await file.text();
  }catch(_){}
}

function esc(s){ return String(s ?? '').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
</script>
</body>
</html>
